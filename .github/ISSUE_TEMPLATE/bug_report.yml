name: Bug Report
description: Report a bug or unexpected behavior in contree-cli
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is, including what you expected to happen.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `contree ...`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please paste the output of `contree --version`:
      placeholder: |
        contree-cli/0.4.4 Python/3.12.0.final.0 Linux-6.5.0-x86_64-with-glib2.35
      render: shell
    validations:
      required: true

  - type: dropdown
    id: usage-context
    attributes:
      label: Usage Context
      description: How are you using contree-cli?
      options:
        - Terminal (interactive)
        - Shell mode (contree shell)
        - Agent integration (Claude Code, Codex, etc.)
        - Scripts / automation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please copy and paste any relevant error output or logs. Use `--log-level debug` for verbose output.
      render: shell
