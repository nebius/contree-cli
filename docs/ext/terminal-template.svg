<svg class="contree-terminal" viewBox="0 0 {width} {height}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <style>
    .terminal-body {{
        font-family: "Fira Code", monospace;
        font-size: {font_size}px;
        line-height: {line_height}px;
        font-variant-east-asian: full-width;
    }}
    .terminal-title {{
        font-size: 12px;
        font-weight: bold;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }}
    </style>

    <rect fill="{title_bar_color}" stroke="rgba(255,255,255,0.15)" stroke-width="1" x="1" y="1" width="{width}" height="{height}" rx="8"/>
    <text class="terminal-title" fill="#999" text-anchor="middle" x="50%" y="16">{title}</text>
    <g transform="translate(12, 12)">
        <circle cx="0" cy="0" r="4" fill="#ff5f57"/>
        <circle cx="14" cy="0" r="4" fill="#febc2e"/>
        <circle cx="28" cy="0" r="4" fill="#28c840"/>
    </g>

    <rect fill="{bg_color}" x="1" y="24" width="{width}" height="{height}" rx="0"/>

    <g class="terminal-body" xml:space="preserve">
    {content}
    </g>
</svg>
